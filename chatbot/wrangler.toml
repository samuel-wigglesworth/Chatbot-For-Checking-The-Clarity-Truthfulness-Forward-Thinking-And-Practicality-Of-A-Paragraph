name = "paragraph-evaluator"
main = "worker.js"
compatibility_date = "2026-01-01"

# Environment variables
[vars]
# Set your Ollama server URL here
# OLLAMA_API_URL = "http://your-ollama-server.com:11434"
# Ollama model to use
OLLAMA_MODEL = "llama3.1:latest"
# Temperature (controls randomness: 0.0 = deterministic, 1.0 = creative)
TEMPERATURE = 0.3
# Max tokens for Ollama response
MAX_TOKENS = 256

# Or use secrets for production (run: wrangler secret put OLLAMA_API_URL)
# wrangler secret put OLLAMA_API_URL

# Route configuration (adjust to your domain)
# routes = [
#   { pattern = "paragraph-evaluator.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]
